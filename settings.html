<html>
<head>
    <script src="contrast.js"></script>
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="text.css">
    <script defer src="homepage.js"></script>
    <script defer src="settings.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
</head>
<body>
    <div class="topnav">
        <a href="index.html"><span class="material-symbols-outlined">home</span></a>
        <a href="#"><span class="material-symbols-outlined">menu</span></a>
        <a href="settings.html" class="split active"><span class="material-symbols-outlined">settings</span></a>
        <a href="profile.html" class="split"><span class="material-symbols-outlined">person</span></a>
        <a href="#" class="split"><span class="material-symbols-outlined">mail</span></a>
        <a href="#" class="split"><span class="material-symbols-outlined">bookmark</span></a>
        <div class="search-container">
            <form action="#" onsubmit="doSearch(); return false;">
                <input type="text" placeholder="Search.." name="search">
                <button type="submit"><span class="material-symbols-outlined">search</span></button>
            </form>
        </div>
    </div>
    
    <div class="settings-page">
        <h1>Settings</h1>

        <div class="settings-section">
            <h2>Appearance</h2>
            <div class="setting-row">
                <label>Dark Mode</label>
                <label class="toggle">
                    <input type="checkbox" id="darkmode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-row">
                <label>Font Size</label>
                <div class="font-size-options">
                    <button class="size-btn" data-size="small">Small</button>
                    <button class="size-btn" data-size="medium">Medium</button>
                    <button class="size-btn" data-size="large">Large</button>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <h2>Contrast</h2>
            <div class="setting-row">
                <label>Text Contrast</label>
                <div class="font-size-options">
                    <button class="contrast-btn" data-contrast="normal">Normal</button>
                    <button class="contrast-btn" data-contrast="soft">Soft</button>
                    <button class="contrast-btn" data-contrast="high">High</button>
                </div>
            </div>
            <div class="contrast-preview">
                <p id="contrast-preview-text">The quick brown fox jumps over the lazy dog.</p>
            </div>
        </div>

        <div class="settings-section">
            <button class="reset-btn" onclick="resetSettings()">Reset to Default</button>
        </div>
    </div>
</body>
</html>
